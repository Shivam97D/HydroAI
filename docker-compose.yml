version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hydroai_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hydroai
      POSTGRES_PASSWORD: hydroai
      POSTGRES_DB: hydroai
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydroai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── HydroAI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hydroai_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://hydroai:hydroai@db:5432/hydroai
      BASE_URL: http://localhost:8000
      APP_ENV: production
    volumes:
      - maps_data:/app/maps
      - ./backend/models:/app/models:ro
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── HydroAI Frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: hydroai_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pg_data:
  maps_data:
